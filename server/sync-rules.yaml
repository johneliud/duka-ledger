# PowerSync Sync Rules Configuration
# See https://docs.powersync.com/sync/advanced/compatibility
config:
  edition: 3

# Simple stream - sync all data (use for testing)
streams:
  products:
    auto_subscribe: true
    query: SELECT * FROM products

  sales:
    auto_subscribe: true
    query: SELECT * FROM sales

  expenses:
    auto_subscribe: true
    query: SELECT * FROM expenses

  debts:
    auto_subscribe: true
    query: SELECT * FROM debts
